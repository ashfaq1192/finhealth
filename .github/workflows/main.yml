name: Daily Score Update

on:
  schedule:
    # 14:00 UTC = 09:00 AM EST / 10:00 AM EDT
    - cron: "0 14 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  update-score:
    name: Fetch FRED Data, Score & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -u backend/crew.py

      - name: Write job summary on success
        if: success()
        run: |
          echo "## Daily Score Update — SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "Pipeline completed at $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Write job summary on failure
        if: failure()
        run: |
          echo "## Daily Score Update — FAILED" >> $GITHUB_STEP_SUMMARY
          echo "Pipeline failed at $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Check logs above. GitHub will email the repository owner." >> $GITHUB_STEP_SUMMARY
