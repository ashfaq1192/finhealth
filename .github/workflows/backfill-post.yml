name: Backfill Blog Post for a Past Date

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Date to backfill (YYYY-MM-DD). Must have a content_calendar entry."
        required: true
        default: ""

concurrency:
  group: finhealth-pipeline
  cancel-in-progress: false

jobs:
  backfill:
    name: Generate & publish post for ${{ inputs.target_date }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backfill pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BACKFILL_DATE: ${{ inputs.target_date }}
        run: python -u backend/crew.py

      - name: Write job summary on success
        if: success()
        run: |
          echo "## Backfill — SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "Blog post published for **${{ inputs.target_date }}** at $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Write job summary on failure
        if: failure()
        run: |
          echo "## Backfill — FAILED" >> $GITHUB_STEP_SUMMARY
          echo "Check logs above for errors. Date: ${{ inputs.target_date }}" >> $GITHUB_STEP_SUMMARY
